<style>
* {
    border: none;
    padding: 0;
    margin: 0;
}
:root { /* Light mode colors */
    --theme: #0cc;
    --theme-dim: color-mix(in srgb, var(--theme), black 20%);
    --cta: var(--theme-dim);
    --cta-hover: var(--theme);
    --bg-color: white;
    --fg-color: black;
}
@media (prefers-color-scheme: dark) {
    :root { /* Dark mode */
    --theme: #0ff;
    --bg-color: black;
    --fg-color: white;
    }
}
body {
    background-color: var(--bg-color);
    color: var(--fg-color);
    padding: 1rem;
}
a {
    display: inline-block;
    padding: 1rem;
    background-color: var(--cta);
    color: black;
    border-radius: 0.5rem;
}
a {
    background-color: var(--cta);
}
a:hover {
    background-color: var(--cta-hover);
}
a:active {
    opacity: 0.5;
}
h1, h2, p {
    margin: 1rem 0;
}
h2 {
    margin-top: 2rem;
}
</style>

<h1>Chris Hulbert</h1>
<p>Welcome to my eclectic collection of projects!</p>

<h2>ScaleFX</h2>
<p>ScaleFX is one of the best pixel-art upscaling algorithms. I've ported it to Rust and Javascript.
With the Javascript widget, you can drag in a PNG and it will upscale it 9x.</p>
